# Railway: crear servicio con "Root Directory" = server
# Ver RAILWAY.md para volumen + variables.

[build]
builder = "NIXPACKS"

[deploy]
releaseCommand = "npx prisma db push --accept-data-loss"
startCommand = "npm run start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
